<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Load Supabase JS Client before our custom scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <h2>Admin<span style="color:#f1c40f">Panel</span></h2>
            <ul>
                <li class="active"><i data-feather="box"></i> Products</li>
            </ul>
        </aside>
        
        <main class="main-content">
            <header>
                <h1>Manage Inventory</h1>
                <p>Changes here will reflect on your main website instantly via Supabase.</p>
            </header>
            
            <section class="add-product-section card">
                <h2><i data-feather="plus-circle"></i> Add New Product</h2>
                <form id="addProductForm">
                    <div class="form-group">
                        <label for="pName">Product Name</label>
                        <input type="text" id="pName" required placeholder="e.g. Organic Soap">
                    </div>
                    <div class="form-group">
                        <label for="pCategory">Category</label>
                        <select id="pCategory" required>
                            <option value="Skincare">Skincare</option>
                            <option value="Food">Food</option>
                            <option value="Bath & Body">Bath & Body</option>
                            <option value="Accessories">Accessories</option>
                            <option value="Wellness">Wellness</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pPrice">Price (₹)</label>
                        <input type="number" step="0.01" id="pPrice" required placeholder="99">
                    </div>
                    <div class="form-group">
                        <label for="pDesc">Description</label>
                        <textarea id="pDesc" rows="3" required placeholder="Describe the item..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="pImage">Image URL</label>
                        <input type="url" id="pImage" required placeholder="https://example.com/image.jpg">
                        <small>Provide a direct link to an image. (We recommend hosting on Imgur or using Supabase storage)</small>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn"><i data-feather="save"></i> Publish Product to Store</button>
                </form>
            </section>
        </main>
    </div>
    
    <!-- Load config and admin logic -->
    <script src="../supabaseClient.js"></script>
    <script src="admin.js"></script>
    <script>feather.replace();</script>
</body>
</html>
